# PostgREST 14.x — SolarFlow 로컬 개발용
# 실행: postgrest ./postgrest.conf

## DB 연결
db-uri = "postgresql://chnops.ak@localhost:5432/solarflow"
db-schemas = "public"
db-anon-role = "chnops.ak"

## 서버
server-port = 3000
server-root-path = "/rest/v1"

## JWT 인증 (supabase-go가 보내는 apikey/Bearer 토큰 검증)
jwt-secret = "$(SUPABASE_JWT_SECRET)"
jwt-secret-is-base64 = false
