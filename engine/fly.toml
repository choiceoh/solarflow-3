app = 'solarflow-engine'
primary_region = 'nrt'

[build]

[env]
PORT = '8081'
RUST_LOG = 'info'

[http_service]
internal_port = 8081
force_https = true
auto_stop_machines = 'off'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
size = 'shared-cpu-1x'
memory = '1024mb'
