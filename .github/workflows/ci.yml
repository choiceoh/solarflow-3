name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 PR에서 새 push가 오면 진행 중인 run을 취소 (CI 시간 절약)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # 어느 디렉토리가 변경됐는지 판정 — 무관한 컴포넌트 빌드는 스킵
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      engine: ${{ steps.filter.outputs.engine }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - '!backend/migrations/**'
              - '!backend/scripts/**'
              - '!backend/sql/**'
              - '.github/workflows/ci.yml'
            engine:
              - 'engine/src/**'
              - 'engine/Cargo.toml'
              - 'engine/Cargo.lock'
              - '.github/workflows/ci.yml'

  # 프론트 — Cloudflare Pages가 클린 인스톨로 빌드하므로 동일 환경에서 검증.
  # PR99에서 persist.ts deps 누락이 main에 들어가 #142~#145가 줄줄이 깨졌던 사고
  # 재발 방지가 이 잡의 1차 목적.
  # 2026-05 Bun 으로 마이그레이션 (npm → bun) — install ~4배, 테스트 호환 100%.
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      # package.json 변경 후 bun.lock 갱신 누락을 설치/빌드보다 먼저 선명하게 잡는다.
      - name: Verify dependency lock
        run: bun run lock:check
      # bun install 은 자체 글로벌 캐시 사용. setup-bun 이 ~/.bun/install/cache 자동 캐시.
      - run: bun install --frozen-lockfile
      # vite/tsc 의 incremental 산출물(.vite, .tmp/*.tsbuildinfo)을 캐시.
      - name: Cache vite + tsc incrementals
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules/.vite
            frontend/node_modules/.tmp
          key: ${{ runner.os }}-fe-build-${{ hashFiles('frontend/package.json', 'frontend/bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-fe-build-${{ hashFiles('frontend/package.json', 'frontend/bun.lock') }}-
            ${{ runner.os }}-fe-build-
      # tsc 는 noEmit, vite 가 emit 전담이라 직렬일 이유 없음. 둘 다 실패 캐치.
      - name: Type check + build (parallel)
        shell: bash
        run: |
          set -e
          bunx tsc -b &
          TSC_PID=$!
          bunx vite build
          wait $TSC_PID
      - run: bun run test

  # 백엔드 (Go) — 운영은 cron-deploy.sh가 머지 후 빌드하므로 PR 단계에서 막아야
  # 운영 빌드 실패 = 사용자 발견 시점이 cron 다음 회차로 늦춰짐.
  # gx10 self-hosted runner: arch 패리티(aarch64=운영 동일 박스) + 영구 캐시.
  # 2026-05-14 spark4tb → gx10 이전 — spark4tb 가 잦은 offline 으로 backend 잡이
  # 큐에 매달려 cancel 되는 일이 반복되어, 운영 박스 자체에 별도 runner 등록.
  # 운영 서비스(solarflow-go/engine) 와 동거하지만 PR CI 빌드는 짧고 가벼움.
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: [self-hosted, ARM64, gx10]
    timeout-minutes: 10
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('backend/go.sum') }}-${{ hashFiles('backend/**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('backend/go.sum') }}-
            ${{ runner.os }}-${{ runner.arch }}-go-
      # go test -vet=all ./... 이 vet 과 비-test 패키지 컴파일을 모두 커버. go build 는 main 의 link 검증.
      # 둘은 독립이라 병렬 실행. frontend job 의 tsc/vite 병렬 패턴과 동일.
      - name: Test + build (parallel)
        shell: bash
        run: |
          set -e
          go test -vet=all ./... &
          TEST_PID=$!
          go build ./...
          wait $TEST_PID

  # 엔진 (Rust) — 빌드 시간이 길어 캐시 필수. release 빌드는 운영과 동일.
  # spark4tb self-hosted runner 사용: arch 패리티(aarch64=운영과 동일) + 영구 디스크
  # 캐시. spark4tb 가 offline 일 경우 timeout-minutes 로 빠르게 실패 → 본인이 인지.
  engine:
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: [self-hosted, ARM64, spark4tb]
    timeout-minutes: 30
    defaults: { run: { working-directory: engine } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo build --release
      # 테스트는 debug + nextest 로 — release 옵티마이즈는 정확성 검증에 불필요하고
      # 컴파일이 2-3배 느림. nextest 는 cargo test 대비 병렬성이 좋아 30-60% 빠름.
      # 운영 산출물 검증은 위 cargo build --release 가 담당. 도큐테스트 없음.
      - run: cargo nextest run

  # 단일 required check 게이트 — frontend/backend/engine 은 path-filter 로 skip
  # 가능하므로 그것들을 각각 required 로 두면 무관한 PR 이 영원히 대기한다.
  # 이 잡 하나만 required 로 등록하고 안에서 모든 잡 결과를 집계한다.
  # skip(="skipped") 은 통과로 인정, failure/cancelled 만 fail.
  ci-summary:
    needs: [changes, frontend, backend, engine]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate job results
        shell: bash
        run: |
          changes='${{ needs.changes.result }}'
          frontend='${{ needs.frontend.result }}'
          backend='${{ needs.backend.result }}'
          engine='${{ needs.engine.result }}'
          printf 'changes=%s\nfrontend=%s\nbackend=%s\nengine=%s\n' \
            "$changes" "$frontend" "$backend" "$engine"
          for r in "$changes" "$frontend" "$backend" "$engine"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::A required CI job failed or was cancelled"
              exit 1
            fi
          done
