name: Enable auto-merge on PR open

# Uses a GitHub App token (not GITHUB_TOKEN) so that pushes from
# update-branch trigger downstream CI workflows. GITHUB_TOKEN-driven
# pushes are intentionally suppressed by GitHub to prevent recursive
# workflow loops, which left BEHIND PRs stuck without CI.
#
# Required repo secrets:
#   AUTOMERGE_APP_ID           - the GitHub App's numeric App ID
#   AUTOMERGE_APP_PRIVATE_KEY  - the App's PEM private key (full file)
#
# The App must be installed on this repo with permissions:
#   - Contents: Read & Write   (for update-branch)
#   - Pull requests: Read & Write  (for auto-merge)

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  push:
    branches: [main]

permissions: {}

jobs:
  enable:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
      - run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  refresh-behind-prs:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
      - name: Update BEHIND PRs with auto-merge enabled
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          # GitHub recomputes mergeStateStatus async after a push to main.
          # We do two passes (+30s, +60s) so PRs that flip to BEHIND after
          # the first scan are still caught in the same workflow run.
          for pass in 1 2; do
            sleep 30
            mapfile -t prs < <(gh pr list --repo "$REPO" --base main --state open \
              --json number,isDraft,autoMergeRequest,mergeStateStatus \
              --jq '.[] | select(.isDraft == false and .autoMergeRequest != null and .mergeStateStatus == "BEHIND") | .number')
            if [ ${#prs[@]} -eq 0 ]; then
              echo "Pass $pass: no BEHIND PRs."
              continue
            fi
            echo "Pass $pass: updating ${#prs[@]} BEHIND PR(s): ${prs[*]}"
            for pr in "${prs[@]}"; do
              if gh api -X PUT "repos/$REPO/pulls/$pr/update-branch" --silent; then
                echo "Updated PR #$pr"
              else
                echo "::warning::Failed to update PR #$pr (likely conflicts)"
              fi
            done
          done
