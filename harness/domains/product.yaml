schema_version: 1

id: product
display_name: "제품 마스터 (Product)"

pack: erp-core
feature_id: master.product
visible_to: all

paths:
  backend:
    - backend/internal/domains/product/

tables: []
depends_on: []
external_users: []

blast_radius:
  - description: "product model 필드 변경"
    must_check:
      - "backend/internal/domains/product/handler.go Validation"
      - "backend/migrations/ + check_schema.sh"

verify_scripts:
  - command: scripts/verify_changed.sh
    when: always
  - command: backend/scripts/check_schema.sh
    when: model_or_migration_changed

owners: [choiceoh]
decisions: []
