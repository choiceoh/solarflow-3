# TT (Telegraphic Transfer) — 도메인 manifest
#
# PR-C2 의 TT 이주. LC 와 같은 PR. utility dup 만 — audit 사용 X.
# 형식 명세: harness/domains/README.md

schema_version: 1

id: tt
display_name: "송금 (T/T)"

# === Pack / Feature / Tenant 배선 ===
pack: module-finance
feature_id: tx.tt
visible_to: module

# === 코드 위치 ===
paths:
  backend:
    - backend/internal/domains/tt/   # colocation 완료 — model + handler + dashboard + util
  frontend:
    - frontend/src/packs/module-finance/pages/ProcurementPage.tsx   # 통합 페이지 — PR-D 에서 분리
  migrations:
    - backend/migrations/0[0-9]?_*tt*.sql

# === DB ===
tables:
  - tt_remittances

# === 의존 도메인 ===
depends_on:
  - po            # TTRemittance.POID

# === 외부 사용자 ===
external_users:
  - backend/internal/handler/io_import_parsers.go   # parseTTRow

# === Blast Radius ===
blast_radius:
  - description: "TT model 필드 추가/삭제"
    must_check:
      - "backend/internal/domains/tt/handler.go (Validation 흐름)"
      - "frontend/src/packs/module-finance/pages/ProcurementPage.tsx (TT 탭 form)"
      - "backend/migrations/ + check_schema.sh"

  - description: "TT 상태 (status) 전이 변경"
    must_check:
      - "backend/internal/domains/tt/model.go 의 validTTStatuses"
      - "프론트 status 표시 컴포넌트"

  - description: "TT 외부 사용 (io_import_parsers)"
    must_check:
      - "import \"solarflow-backend/internal/domains/tt\" + tt.X prefix"

# === 자동 실행 검증 ===
verify_scripts:
  - command: scripts/verify_changed.sh
    when: always
  - command: backend/scripts/check_schema.sh
    when: model_or_migration_changed
  - command: "cd backend && go test ./internal/domains/tt/..."
    when: handler_changed
  - command: "cd backend && go test ./internal/handler"
    when: route_changed

# === API 라우트 ===
api_routes:
  - GET    /api/v1/tts
  - POST   /api/v1/tts
  - PUT    /api/v1/tts/:id
  - DELETE /api/v1/tts/:id
  - GET    /api/v1/tts/:id

owners: [choiceoh]
