schema_version: 1

id: declaration
display_name: "면장 (Declaration)"

pack: erp-core
feature_id: tx.declaration
visible_to: module

paths:
  backend:
    - backend/internal/domains/declaration/
  migrations:
    - backend/migrations/0[0-9]?_*declaration*.sql

tables: []
depends_on: []
external_users: []

blast_radius:
  - description: "declaration model 필드 변경"
    must_check:
      - "backend/internal/domains/declaration/handler.go Validation"
      - "backend/migrations/ + check_schema.sh"

verify_scripts:
  - command: scripts/verify_changed.sh
    when: always
  - command: backend/scripts/check_schema.sh
    when: model_or_migration_changed

api_routes: []

owners: [choiceoh]
decisions: []
